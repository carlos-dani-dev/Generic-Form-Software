{% extends "layout.html" %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-body">
            <form id="addQuestionForm">
                <div class="form-group">
                    <label>Questão</label>
                    <textarea name="question_text" class="form-control" rows=3></textarea>
                </div>
                <div class="form-group">
                    <label>Order</label>
                    <select name="order" class="form-control">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" name="is_mandatory">
                    <label class="form-check-label">Obrigatória</label>
                </div>
                <button type="submit" class="btn btn-primary">Adicionar questão</button>
                <a href="/admin/survey" class="btn btn-success">Back</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script src="{{ url_for('static', path='/js/pages/create_question.js') }}" defer></script>
{% endblock %}

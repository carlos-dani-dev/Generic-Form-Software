{% extends "layout.html" %}

{% block content %}
<div class="container-fluid py-4 px-4">

    <div class="card border-0 shadow-sm">

        <div class="card-body p-4">

            <div class="mb-4">
                <h5 class="fw-semibold mb-1">Adicionar questão</h5>
                <small class="text-muted">
                    Preencha os dados da nova questão
                </small>
            </div>

            <form id="addQuestionForm">

                <div class="mb-3">
                    <label class="form-label small text-muted">Questão</label>
                    <textarea
                        name="question_text"
                        class="form-control form-control-sm"
                        rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-muted">Ordem</label>
                    <select
                        name="order"
                        class="form-select form-select-sm">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>

                <div class="form-check mb-4">
                    <input
                        type="checkbox"
                        class="form-check-input"
                        name="is_mandatory"
                        id="isMandatory">
                    <label
                        class="form-check-label small text-muted"
                        for="isMandatory">
                        Obrigatória
                    </label>
                </div>

                <div class="justify-content-start gap-3">
                    <a
                        href="/admin/survey"
                        class="btn btn-sm btn-outline-secondary">
                        Voltar
                    </a>

                    <button
                        type="submit"
                        class="btn btn-sm btn-outline-success">
                        Adicionar questão
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>
{% endblock %}

{% block script %}
<script src="{{ url_for('static', path='/js/pages/create_question.js') }}" defer></script>
{% endblock %}
